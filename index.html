<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' https://esm.sh https://fonts.googleapis.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
    font-src    https://fonts.gstatic.com;
    connect-src 'self' https://api.elevenlabs.io https://esm.sh;
    img-src     'self' data: blob:;
    media-src   blob:;
  " />

  <!--
    Importmap — resolves bare specifiers to CDN URLs.
    No build step required: React, htm, immer, and dompurify load directly
    from esm.sh in the browser.
  -->
  <script type="importmap">
  {
    "imports": {
      "react":              "https://esm.sh/react@18.3.1",
      "react/jsx-runtime":  "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom/client":   "https://esm.sh/react-dom@18.3.1/client",
      "immer":              "https://esm.sh/immer@10.1.1",
      "dompurify":          "https://esm.sh/dompurify@3.1.6"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./src/styles/variables.css" />
  <link rel="stylesheet" href="./src/styles/global.css" />
  <link rel="stylesheet" href="./src/styles/homePage.css" />
  <link rel="stylesheet" href="./src/components/StatsBar/StatsBar.css" />
  <link rel="stylesheet" href="./src/components/LocationBanner/LocationBanner.css" />
  <link rel="stylesheet" href="./src/components/SpeakButton/SpeakButton.css" />
  <link rel="stylesheet" href="./src/components/ChoiceList/ChoiceList.css" />
  <link rel="stylesheet" href="./src/components/CombatBox/CombatBox.css" />
  <link rel="stylesheet" href="./src/components/SpeciesSelect/SpeciesSelect.css" />
  <link rel="stylesheet" href="./src/components/Notification/Notification.css" />
  <link rel="stylesheet" href="./src/components/EndingCard/EndingCard.css" />
  <link rel="stylesheet" href="./src/components/SceneCard/SceneCard.css" />
  <link rel="stylesheet" href="./src/components/HistoryLog/HistoryLog.css" />

  <style>
    #bg-art {
      position: fixed;
      inset: 0;
      background: url('./public/map.jpg') center / cover no-repeat;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }
  </style>

  <title>The Chromatic Seal — Ardenveil</title>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React from 'react'
    import { createRoot } from 'react-dom/client'
    import { AppShell } from './src/AppShell.js'

    const container = document.getElementById('root')
    if (!container) throw new Error('#root not found')
    createRoot(container).render(React.createElement(AppShell))
  </script>
</body>
</html>
